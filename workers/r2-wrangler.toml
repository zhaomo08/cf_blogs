# Cloudflare Worker 配置 - R2 图片上传服务
name = "cf-blogs-r2"
main = "r2-upload.js"
compatibility_date = "2024-01-01"

# R2 存储桶绑定
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "cf-blogs-images"

[vars]
# 仅允许这些来源访问上传接口（逗号分隔）
ALLOWED_ORIGINS = "https://cf-blogs-4j9.pages.dev"
# 只允许这些 GitHub 账号上传（逗号分隔，小写）
ALLOWED_GITHUB_LOGINS = "zhaomo08"
# 上传体积上限（字节）
MAX_UPLOAD_BYTES = "10485760"

# 路由配置（可选）
# routes = [
#   { pattern = "r2.zhaomo0823.workers.dev/*", zone_name = "zhaomo0823.workers.dev" }
# ]
