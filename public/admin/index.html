<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>博客管理后台</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    .admin-tools {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 9999;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .admin-tools button {
      border: 0;
      border-radius: 8px;
      background: #1f2937;
      color: #fff;
      font-size: 13px;
      padding: 10px 12px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    }
    .admin-tools button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    @media (max-width: 900px) {
      .admin-tools button {
        font-size: 12px;
        padding: 9px 10px;
      }
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle("/admin/preview.css");
  </script>

  <div class="admin-tools">
    <button id="btn-r2-upload" type="button">上传图片到 R2</button>
  </div>

  <script>
    window.R2_UPLOAD_ENDPOINT = "https://cf-blogs-r2.zhaomo0823.workers.dev/upload";
  </script>

  <script>
    (function () {
      const LOCATION_CACHE_KEY = "cf_blogs_auto_location_v1";
      const CMS_AUTH_STORAGE_KEYS = ["netlify-cms-user", "decap-cms-user"];
      let currentAutoLocation = null;
      let baseViewportHeight = 0;

      function isVisible(node) {
        if (!node) return false;
        const style = window.getComputedStyle(node);
        return style.display !== "none" && style.visibility !== "hidden";
      }

      function findEditorTarget() {
        const active = document.activeElement;
        if (
          active &&
          isVisible(active) &&
          (active.tagName === "TEXTAREA" || active.isContentEditable || active.getAttribute("role") === "textbox")
        ) {
          return active;
        }

        const candidates = Array.from(
          document.querySelectorAll("textarea, [contenteditable='true'], [role='textbox']")
        ).filter(isVisible);

        return candidates.length ? candidates[candidates.length - 1] : null;
      }

      function insertIntoTextarea(textarea, text) {
        const start = textarea.selectionStart || 0;
        const end = textarea.selectionEnd || 0;
        const value = textarea.value || "";
        const next = value.slice(0, start) + text + value.slice(end);
        textarea.value = next;
        textarea.dispatchEvent(new Event("input", { bubbles: true }));
        const pos = start + text.length;
        textarea.setSelectionRange(pos, pos);
        textarea.focus();
        return true;
      }

      function insertIntoContentEditable(el, text) {
        el.focus();
        if (document.execCommand) {
          const ok = document.execCommand("insertText", false, text);
          if (ok) {
            el.dispatchEvent(new Event("input", { bubbles: true }));
            return true;
          }
        }
        el.textContent = (el.textContent || "") + text;
        el.dispatchEvent(new Event("input", { bubbles: true }));
        return true;
      }

      function insertMarkdownToEditor(markdown) {
        const target = findEditorTarget();
        if (!target) return false;
        const text = "\n" + markdown + "\n";

        if (target.tagName === "TEXTAREA") {
          return insertIntoTextarea(target, text);
        }
        return insertIntoContentEditable(target, text);
      }

      function readCmsAuthToken() {
        const keys = [...CMS_AUTH_STORAGE_KEYS];
        try {
          for (let i = 0; i < localStorage.length; i += 1) {
            const key = localStorage.key(i);
            if (!key) continue;
            const lower = key.toLowerCase();
            if (lower.includes("cms") || lower.includes("decap") || lower.includes("netlify")) {
              keys.push(key);
            }
          }
        } catch (_) {}

        for (const key of keys) {
          let raw = null;
          try {
            raw = localStorage.getItem(key);
          } catch (_) {
            raw = null;
          }
          if (!raw) continue;

          try {
            const parsed = JSON.parse(raw);
            const candidates = [
              parsed?.token,
              parsed?.access_token,
              parsed?.user?.token,
              parsed?.user?.access_token,
              parsed?.backend?.token,
              parsed?.github?.token,
            ];
            for (const candidate of candidates) {
              if (typeof candidate === "string" && candidate.trim()) {
                return candidate.trim();
              }
            }
          } catch (_) {}
        }
        return "";
      }

      async function uploadToR2(file) {
        const githubToken = readCmsAuthToken();
        if (!githubToken) {
          throw new Error("未检测到 CMS 登录态，请先刷新页面并重新登录后台后再上传。");
        }
        const form = new FormData();
        form.append("file", file);
        const resp = await fetch(window.R2_UPLOAD_ENDPOINT, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${githubToken}`,
          },
          body: form,
        });
        if (!resp.ok) {
          let detail = "";
          try {
            const payload = await resp.json();
            detail = payload?.error ? `: ${payload.error}` : "";
          } catch (_) {}
          throw new Error(`Upload failed (${resp.status})${detail}`);
        }
        return resp.json();
      }

      function pickFile() {
        return new Promise((resolve) => {
          const input = document.createElement("input");
          input.type = "file";
          input.accept = "image/*";
          input.onchange = () => resolve(input.files && input.files[0] ? input.files[0] : null);
          input.click();
        });
      }

      async function handleR2Upload() {
        const btn = document.getElementById("btn-r2-upload");
        try {
          btn.disabled = true;
          btn.textContent = "上传中...";
          const file = await pickFile();
          if (!file) return;
          const payload = await uploadToR2(file);
          if (!payload || !payload.url) throw new Error("Missing url");

          const markdown = `![${file.name}](${payload.url})`;
          const inserted = insertMarkdownToEditor(markdown);
          if (inserted) {
            alert("上传成功，已插入 Markdown 图片。");
          } else {
            window.prompt("已上传成功，请手动复制下面 Markdown：", markdown);
          }
        } catch (err) {
          const msg = err && err.message ? err.message : String(err);
          alert("上传失败: " + msg);
        } finally {
          btn.disabled = false;
          btn.textContent = "上传图片到 R2";
        }
      }

      function splitTags(text) {
        return text
          .split(/[，,、]/)
          .map((v) => v.trim())
          .filter(Boolean);
      }

      function parseCommentMetaBlock(body) {
        const source = String(body || "");
        const match = source.match(/^\s*<!--\s*meta\s*([\s\S]*?)-->\s*/i);
        if (!match) {
          return { body: source, description: "", tags: null, cover: "" };
        }

        const metaText = match[1] || "";
        const nextBody = source.replace(match[0], "");
        let description = "";
        let tags = null;
        let cover = "";

        metaText.split(/\r?\n/).forEach((line) => {
          const item = line.trim();
          if (!item) return;

          const kv = item.match(/^([a-zA-Z_]+)\s*:\s*(.+)$/);
          if (!kv) return;
          const key = kv[1].toLowerCase();
          const value = kv[2].trim();

          if (key === "description" || key === "desc") {
            description = value;
            return;
          }

          if (key === "tags") {
            tags = splitTags(value);
            return;
          }

          if (key === "cover" || key === "image") {
            cover = value;
          }
        });

        return { body: nextBody, description, tags, cover };
      }

      function parseInlineMetaSyntax(body) {
        const source = String(body || "");
        const lines = source.split(/\r?\n/);
        let idx = 0;
        while (idx < lines.length && !lines[idx].trim()) idx += 1;

        let tags = null;
        let description = "";
        let cover = "";
        let consumedUntil = idx;
        let hasMeta = false;

        const tagsMatch = lines[idx] && lines[idx].trim().match(/^\[(.+)\]\s*$/);
        if (tagsMatch) {
          tags = splitTags(tagsMatch[1] || "");
          consumedUntil = idx + 1;
          hasMeta = true;
          idx += 1;
          while (idx < lines.length && !lines[idx].trim()) idx += 1;
        }

        const descMatch = lines[idx] && lines[idx].trim().match(/^\((.+)\)\s*$/);
        if (descMatch) {
          description = (descMatch[1] || "").trim();
          consumedUntil = idx + 1;
          hasMeta = true;
          idx += 1;
          while (idx < lines.length && !lines[idx].trim()) idx += 1;
        }

        const coverMatch = lines[idx] && lines[idx].trim().match(/^(?:cover|封面)\s*:\s*(https?:\/\/\S+)\s*$/i);
        if (coverMatch) {
          cover = coverMatch[1].trim();
          consumedUntil = idx + 1;
          hasMeta = true;
        }

        if (!hasMeta) {
          return { body: source, description: "", tags: null, cover: "" };
        }

        const bodyLines = lines.slice(consumedUntil);
        const cleanedBody = bodyLines.join("\n").replace(/^\s+/, "");
        return { body: cleanedBody, description, tags, cover };
      }

      function extractFirstMarkdownImage(body) {
        const source = String(body || "");
        const mdMatch = source.match(/!\[[^\]]*]\((https?:\/\/[^)\s]+)\)/i);
        if (mdMatch && mdMatch[1]) return mdMatch[1].trim();
        const htmlMatch = source.match(/<img[^>]+src=["'](https?:\/\/[^"']+)["']/i);
        if (htmlMatch && htmlMatch[1]) return htmlMatch[1].trim();
        return "";
      }

      function normalizeCoverUrl(value) {
        const text = String(value || "").trim();
        if (!text) return "";
        try {
          const url = new URL(text);
          if (url.protocol === "http:" || url.protocol === "https:") {
            return url.toString();
          }
          return "";
        } catch (_) {
          return "";
        }
      }

      function extractFirstParagraph(body) {
        const source = String(body || "")
          .replace(/!\[[^\]]*]\((?:[^)]+)\)/g, " ")
          .replace(/<img[^>]*>/gi, " ")
          .replace(/```[\s\S]*?```/g, " ")
          .replace(/`[^`]+`/g, " ")
          .replace(/^#+\s+/gm, "")
          .replace(/^\s*[-*]\s+/gm, "")
          .replace(/^\s*\d+\.\s+/gm, "");

        const lines = source.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        const first = lines.find((line) => line.length > 6) || "";
        if (!first) return "";
        return first.length > 140 ? `${first.slice(0, 137)}...` : first;
      }

      function parseBodyMeta(body) {
        const fromComment = parseCommentMetaBlock(body);
        const fromInline = parseInlineMetaSyntax(fromComment.body);
        const finalBody = fromInline.body;
        return {
          body: finalBody,
          description: fromInline.description || fromComment.description,
          tags: fromInline.tags || fromComment.tags,
          cover: normalizeCoverUrl(fromInline.cover || fromComment.cover || extractFirstMarkdownImage(finalBody)),
        };
      }

      function normalizeLocationValue(raw) {
        if (!raw) return null;
        let value = raw;
        if (value && typeof value === "object" && typeof value.toJS === "function") {
          value = value.toJS();
        }
        if (!value || typeof value !== "object") return null;

        const lat = Number(value.lat);
        const lng = Number(value.lng);
        const name = String(value.name || "").trim();
        if (!Number.isFinite(lat) || !Number.isFinite(lng) || !name) return null;

        return {
          name,
          lat: Number(lat.toFixed(6)),
          lng: Number(lng.toFixed(6)),
        };
      }

      function saveLocationCache(location) {
        try {
          localStorage.setItem(LOCATION_CACHE_KEY, JSON.stringify(location));
        } catch (_) {}
      }

      function readLocationCache() {
        try {
          const raw = localStorage.getItem(LOCATION_CACHE_KEY);
          if (!raw) return null;
          return normalizeLocationValue(JSON.parse(raw));
        } catch (_) {
          return null;
        }
      }

      function getCurrentPositionAsync() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) {
            reject(new Error("Geolocation API unavailable"));
            return;
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 10 * 60 * 1000,
          });
        });
      }

      async function reverseGeocode(lat, lng) {
        const endpoint = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`;
        const resp = await fetch(endpoint, { headers: { Accept: "application/json" } });
        if (!resp.ok) throw new Error("Reverse geocode failed");
        const data = await resp.json();
        const fallback = `${lat}, ${lng}`;
        return String(data.display_name || fallback).trim() || fallback;
      }

      async function refreshAutoLocation() {
        try {
          const pos = await getCurrentPositionAsync();
          const lat = Number(pos.coords.latitude.toFixed(6));
          const lng = Number(pos.coords.longitude.toFixed(6));
          let name = `${lat}, ${lng}`;
          try {
            name = await reverseGeocode(lat, lng);
          } catch (_) {}
          const location = normalizeLocationValue({ name, lat, lng });
          if (!location) return null;
          currentAutoLocation = location;
          saveLocationCache(location);
          return location;
        } catch (_) {
          return null;
        }
      }

      function normalizeDateValue(value) {
        const nowIso = new Date().toISOString();
        if (!value) return nowIso;

        let raw = value;
        if (raw && typeof raw === "object" && typeof raw.toJS === "function") {
          raw = raw.toJS();
        }

        if (raw && typeof raw === "object") {
          if (typeof raw.toISOString === "function") {
            return raw.toISOString();
          }
          if (typeof raw.value === "string") raw = raw.value;
          else if (typeof raw.date === "string") raw = raw.date;
          else if (typeof raw.raw === "string") raw = raw.raw;
          else return nowIso;
        }

        const text = String(raw).trim();
        if (!text || text === "{{now}}") return nowIso;

        const timestamp = Date.parse(text);
        if (Number.isNaN(timestamp)) return nowIso;
        return new Date(timestamp).toISOString();
      }

      function simplifyChrome() {
        const navLinks = Array.from(document.querySelectorAll("a, button, span"));
        navLinks.forEach((el) => {
          const text = (el.textContent || "").trim().toLowerCase();
          if (text === "工作流" || text === "workflow" || text === "媒体" || text === "media") {
            const node = el.closest("a,button,li,div") || el;
            node.style.display = "none";
          }
        });
      }

      function setupAutoLocation() {
        currentAutoLocation = readLocationCache();
        refreshAutoLocation();

        const touchHandler = () => {
          refreshAutoLocation();
          window.removeEventListener("pointerdown", touchHandler);
        };
        window.addEventListener("pointerdown", touchHandler, { once: true });
      }

      function setupMobileToolVisibility() {
        const tools = document.querySelector(".admin-tools");
        if (!tools) return;

        const viewport = window.visualViewport;
        const update = () => {
          const currentHeight = viewport ? viewport.height : window.innerHeight;
          if (!baseViewportHeight) {
            baseViewportHeight = currentHeight;
          }
          const keyboardLikelyVisible = baseViewportHeight - currentHeight > 150;
          tools.style.opacity = keyboardLikelyVisible ? "0" : "1";
          tools.style.pointerEvents = keyboardLikelyVisible ? "none" : "auto";
          tools.style.transform = keyboardLikelyVisible ? "translateY(8px)" : "translateY(0)";
        };

        update();
        window.addEventListener("resize", update);
        if (viewport) viewport.addEventListener("resize", update);
      }

      CMS.registerEventListener({
        name: "preSave",
        handler: ({ entry }) => {
          const data = entry.get("data");
          const body = data.get("body") || "";
          const parsed = parseBodyMeta(body);

          let next = data.set("body", parsed.body);
          next = next.set("date", normalizeDateValue(data.get("date")));

          if (parsed.description) {
            next = next.set("description", parsed.description);
          } else {
            const fallbackDescription = extractFirstParagraph(parsed.body);
            if (fallbackDescription) {
              next = next.set("description", fallbackDescription);
            }
          }

          if (parsed.tags) {
            const tagsValue = window.Immutable && window.Immutable.fromJS
              ? window.Immutable.fromJS(parsed.tags)
              : parsed.tags;
            next = next.set("tags", tagsValue);
          }

          if (parsed.cover) {
            next = next.set("cover", parsed.cover);
          }

          const existingLocation = normalizeLocationValue(data.get("location"));
          const autoLocation = currentAutoLocation || readLocationCache();
          if (existingLocation) {
            const immutableLocation = window.Immutable && window.Immutable.fromJS
              ? window.Immutable.fromJS(existingLocation)
              : existingLocation;
            next = next.set("location", immutableLocation);
          } else if (autoLocation) {
            const immutableLocation = window.Immutable && window.Immutable.fromJS
              ? window.Immutable.fromJS(autoLocation)
              : autoLocation;
            next = next.set("location", immutableLocation);
          } else {
            next = next.delete("location");
          }

          return next;
        },
      });

      setupAutoLocation();
      setupMobileToolVisibility();
      document.getElementById("btn-r2-upload").addEventListener("click", handleR2Upload);
      setInterval(simplifyChrome, 800);
    })();
  </script>
</body>
</html>
