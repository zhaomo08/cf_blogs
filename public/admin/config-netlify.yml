# Decap CMS 配置文件 - Netlify Identity 版本
backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "zh_Hans"
show_preview_links: true
search: true

collections:
  - name: "blog"
    label: "博客文章"
    label_singular: "文章"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}{{minute}}{{second}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "blog/{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布时间", name: "date", widget: "hidden", default: "" }
      - { label: "摘要", name: "description", widget: "hidden", required: false, default: "" }
      - { label: "标签", name: "tags", widget: "hidden", required: false, default: [] }
      - { label: "草稿", name: "draft", widget: "hidden", default: false }
      - label: "正文（Markdown）"
        name: "body"
        widget: "markdown"
        modes: ["raw"]
        hint: |
          可选元信息写在正文最上方（保存时自动提取并从正文删除）：
          [技术, 生活]
          (这里是摘要描述)
          地点会在保存时自动读取当前位置并写入地图数据（无需手动填写）。
          直接粘贴图片 URL 可显示；本地图片用右下角“上传图片到 R2”按钮。
