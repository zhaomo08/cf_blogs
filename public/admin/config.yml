# Decap CMS 简化配置

backend:
  name: github
  repo: zhaomo08/cf_blogs
  branch: master
  base_url: https://cf-blogs-oauth.zhaomo0823.workers.dev
  auth_endpoint: auth

# 图片上传配置
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# 中文界面
locale: "zh_Hans"

# 集合配置
collections:
  - name: "blog-zh"
    label: "博客文章"
    folder: "src/content/blog/zh"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "text" }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false, default: [] }
      - { label: "草稿", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "正文", name: "body", widget: "markdown" }
