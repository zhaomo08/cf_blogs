backend:
  name: github
  repo: zhaomo08/cf_blogs
  branch: master
  base_url: https://cf-blogs-oauth.zhaomo0823.workers.dev
  auth_endpoint: auth

locale: zh_Hans
site_url: https://cf-blogs-4j9.pages.dev
display_url: https://cf-blogs-4j9.pages.dev
publish_mode: simple

media_folder: "public/images/uploads"
public_folder: "https://cf-blogs-r2.zhaomo0823.workers.dev/images/uploads"

collections:
  - name: "blog"
    label: "博客文章"
    folder: "src/content/blog/zh"
    create: true
    summary: "{{title}}"
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}{{minute}}{{second}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "blog/zh/{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布时间", name: "date", widget: "hidden", default: "" }
      - { label: "摘要", name: "description", widget: "hidden", required: false, default: "" }
      - { label: "标签", name: "tags", widget: "hidden", required: false, default: [] }
      - { label: "草稿", name: "draft", widget: "hidden", default: false }
      - label: "正文（Markdown）"
        name: "body"
        widget: "markdown"
        modes: ["raw", "rich_text"]
        hint: |
          可选元信息写在正文最上方（保存时自动提取并从正文删除）：
          [技术, 生活]
          (这里是摘要描述)
          地点会在保存时自动读取当前位置并写入地图数据（无需手动填写）。
          直接粘贴图片 URL 可显示；本地图片用右下角“上传图片到 R2”按钮。
          可在编辑器底部切换 Markdown/富文本，并用右侧预览查看渲染效果。
