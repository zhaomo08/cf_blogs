# 此 workflow 已禁用
# 使用 Cloudflare Pages 的 GitHub 集成自动部署
# 配置方法见 SIMPLE_DEPLOY.md

name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:  # 只能手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to Cloudflare Pages
        id: cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cf-blogs
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          wranglerVersion: '3'

      - name: Deployment URL
        if: success()
        run: echo "Deployed to ${{ steps.cloudflare.outputs.url }}"
